<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenArcade</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="titlebar">
        <span class="logo">Open<b>Arcade</b></span>
        <span class="status"><span class="dot" id="conn-dot"></span> <span id="conn-text">connecting…</span></span>
        <span class="spacer"></span>
        <span class="nick" id="nick" title="Click to change your nickname">guest</span>
      </div>

      <div id="toolbar">
        <button class="tbtn on" data-view="games">🎮 My Games</button>
        <button class="tbtn" data-view="buddies">👥 Buddies</button>
        <button class="tbtn" data-view="news">📰 News</button>
        <button class="tbtn" data-view="options">⚙ Options</button>
      </div>

      <div id="body">
        <div id="rail">
          <div class="railhdr">Games</div>
          <div class="list" id="gamelist"></div>
        </div>

        <div id="main">
          <div id="home">
            <h1>Open<b>Arcade</b></h1>
            <div class="hint">Pick a game on the left to enter its room — live servers, chat, and who's around.</div>
            <div class="hint" id="home-stat"></div>
          </div>

          <div id="room" class="hidden">
            <div id="roomhdr">
              <span id="room-title">—</span>
              <span class="sub" id="room-sub"></span>
              <span class="spacer"></span>
              <button class="fbtn" id="btn-refresh">↻ Refresh</button>
            </div>

            <div id="parlorwrap" class="hidden">
              <div id="parlor-controls"></div>
              <div id="parlorboard"></div>
            </div>

            <div id="browserwrap">
              <div id="filters">
                <label><input type="checkbox" id="f-empty"> Hide empty</label>
                <label><input type="checkbox" id="f-full"> Hide full</label>
                <label>Find: <input type="text" id="f-search" placeholder="server or map…"></label>
                <span class="spacer" style="flex:1"></span>
                <span id="srv-count" class="col-addr"></span>
              </div>
              <div class="tablescroll">
                <table class="browser">
                  <thead>
                    <tr id="browser-head"></tr>
                  </thead>
                  <tbody id="browser-body"></tbody>
                </table>
              </div>
            </div>

            <div id="lower">
              <div id="chatwrap">
                <div class="paneltitle">Room Chat</div>
                <div id="chatlog"></div>
                <div id="chatinput">
                  <input type="text" id="chat-text" placeholder="Say something to the room…" maxlength="300" />
                  <button id="chat-send">Send</button>
                </div>
              </div>
              <div id="members">
                <div class="paneltitle">Members (<span id="member-count">0</span>)</div>
                <div id="memberlist"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
